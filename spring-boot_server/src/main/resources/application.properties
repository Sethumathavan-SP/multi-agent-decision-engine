spring.application.name=multi-agent-decision-engine

spring.datasource.url=jdbc:postgresql://localhost:5432/decision_engine
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable data.sql initialization
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
app.security.secret=your-secret-key
app.security.expiration=86400000 # 24 hours in milliseconds

# Server port
server.port=8080